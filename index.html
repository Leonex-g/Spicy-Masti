<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spicy Masti</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #ffffff;
  color: #222;
}

/* INTRO SCREEN */
#intro {
  position: fixed;
  inset: 0;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  animation: fadeOut 1s ease forwards;
  animation-delay: 2.5s;
}

.intro-logo {
  font-size: 3rem;
  font-weight: 800;
  color: #000;
  text-shadow:
    0 4px 0 rgba(0,0,0,0.25),
    0 8px 18px rgba(0,0,0,0.25);
  animation: zoomIn 2.2s ease forwards;
}

@keyframes zoomIn {
  0% { opacity: 0; transform: scale(0.6); }
  100% { opacity: 1; transform: scale(1); }
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* LOGO */
header {
  text-align: center;
  padding: 28px 16px;
}

.logo {
  font-size: 2.6rem;
  font-weight: 800;
  color: #000;
  text-shadow:
    0 3px 0 rgba(0,0,0,0.25),
    0 6px 14px rgba(0,0,0,0.25);
}

/* ACTION BUTTONS */
.action-buttons {
  display: flex;
  gap: 14px;
  padding: 0 16px 14px;
}

.action-buttons a {
  flex: 1;
  text-align: center;
  padding: 14px;
  border-radius: 14px;
  font-weight: 600;
  text-decoration: none;
  color: #000;
  box-shadow: 0 6px 0 rgba(0,0,0,0.18), 0 10px 18px rgba(0,0,0,0.15);
  transition: 0.15s;
}

.action-buttons a:active {
  transform: translateY(4px);
  box-shadow: 0 2px 0 rgba(0,0,0,0.2);
}

.call-btn { background: #00fa9a; }
.map-btn { background: #48d1cc; }

/* STICKY SEARCH */
.search-wrapper {
  position: sticky;
  top: 0;
  background: #fff;
  z-index: 5;
  padding: 12px 16px;
  border-bottom: 1px solid #eee;
}

.search-box input {
  width: 100%;
  max-width: 420px;
  padding: 14px 16px;
  border-radius: 14px;
  border: 1px solid #ccc;
  box-shadow: 0 6px 0 rgba(0,0,0,0.12), 0 10px 18px rgba(0,0,0,0.12);
  font-size: 1rem;
}

/* MENU */
.menu {
  padding: 16px;
}

.category {
  margin-bottom: 22px;
}

.category-title {
  position: sticky;
  top: 74px;
  background: #fff;
  display: flex;
  justify-content: space-between;
  font-size: 1.15rem;
  font-weight: 600;
  padding: 10px 0;
  border-bottom: 2px solid #f2f2f2;
  cursor: pointer;
}

.items {
  margin-top: 8px;
}

.menu-item {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px dashed #ddd;
  font-size: 0.95rem;
}

/* SEARCH RESULTS */
#searchResults {
  padding: 16px;
  display: none;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 18px;
  font-size: 0.8rem;
  color: #777;
  border-top: 1px solid #eee;
}

/* DESKTOP */
@media (min-width: 768px) {
  .menu, #searchResults {
    max-width: 720px;
    margin: auto;
  }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="intro-logo">Spicy Masti</div>
</div>

<header>
  <div class="logo">Spicy Masti</div>
</header>

<div class="action-buttons">
  <a href="tel:7290945445" class="call-btn">Contact Us</a>
  <a href="https://maps.app.goo.gl/RL4HiaMXgbRnvpVm8" target="_blank" class="map-btn">View Location</a>
</div>

<div class="search-wrapper">
  <input type="text" id="searchInput" placeholder="Search menu items..." onkeyup="searchMenu()">
</div>

<section id="searchResults"></section>

<section class="menu" id="menu">

  <div class="category">
    <div class="category-title" onclick="toggleCategory(this)">
      <span>Burger (4)</span><span>▼</span>
    </div>
    <div class="items">
      <div class="menu-item"><span>Aloo Tikki Burger</span><span>₹40</span></div>
      <div class="menu-item"><span>Cheese Burger</span><span>₹55</span></div>
      <div class="menu-item"><span>Double Tikki Burger</span><span>₹60</span></div>
      <div class="menu-item"><span>French Burger</span><span>₹80</span></div>
    </div>
  </div>

</section>

<footer>© 2026 Spicy Masti</footer>

<script>
function toggleCategory(title) {
  const items = title.nextElementSibling;
  const arrow = title.querySelector("span:last-child");
  if (items.style.display === "none") {
    items.style.display = "block";
    arrow.textContent = "▼";
  } else {
    items.style.display = "none";
    arrow.textContent = "▲";
  }
}

function searchMenu() {
  const input = searchInput.value.toLowerCase();
  searchResults.innerHTML = "";
  if (!input) {
    menu.style.display = "block";
    searchResults.style.display = "none";
    return;
  }
  menu.style.display = "none";
  searchResults.style.display = "block";
  document.querySelectorAll(".menu-item").forEach(item => {
    if (item.innerText.toLowerCase().includes(input)) {
      searchResults.appendChild(item.cloneNode(true));
    }
  });
}
</script>

</body>
</html>
