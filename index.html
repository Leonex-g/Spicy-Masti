<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spicy Masti</title>

    <!-- Premium Font -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0e0e0e;
            color: #fff;
        }

        header {
            padding: 24px 18px;
            text-align: center;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            color: #ff4500;
            margin-bottom: 6px;
        }

        header p {
            font-size: 0.95rem;
            color: #bdbdbd;
        }

        .search-box {
            display: flex;
            gap: 10px;
            padding: 16px;
            justify-content: center;
        }

        .search-box input {
            flex: 1;
            max-width: 240px;
            padding: 12px 16px;
            border-radius: 25px;
            border: none;
            font-size: 1rem;
            outline: none;
        }

        .search-box button {
            padding: 12px 18px;
            border-radius: 25px;
            border: none;
            background: #ff4500;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }

        .menu {
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .menu-item {
            background: #1a1a1a;
            padding: 18px;
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        .menu-item h3 {
            color: #ff4500;
            font-size: 1.1rem;
            margin-bottom: 6px;
        }

        .menu-item span {
            font-size: 0.9rem;
            color: #cfcfcf;
        }

        footer {
            text-align: center;
            padding: 18px;
            font-size: 0.8rem;
            color: #777;
        }

        /* Tablet */
        @media (min-width: 600px) {
            .menu {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Desktop */
        @media (min-width: 900px) {
            header h1 {
                font-size: 3rem;
            }

            .menu {
                grid-template-columns: repeat(3, 1fr);
                max-width: 1000px;
                margin: auto;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Spicy Masti</h1>
    <p>Unapologetically bold flavors</p>
</header>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search menu...">
    <button onclick="searchMenu()">Search</button>
</div>

<section class="menu" id="menuList">
    <div class="menu-item">
        <h3>Gulab Jamun</h3>
        <span>Soft & syrup-soaked delight</span>
    </div>

    <div class="menu-item">
        <h3>Fried Momos</h3>
        <span>Golden crispy snack</span>
    </div>

    <div class="menu-item">
        <h3>Double Masala Maggi</h3>
        <span>Extra spicy comfort bowl</span>
    </div>

    <div class="menu-item">
        <h3>Oreo Muffin</h3>
        <span>Rich chocolate indulgence</span>
    </div>
</section>

<footer>
    © 2026 Spicy Masti
</footer>

<script>
    function searchMenu() {
        let input = document.getElementById("searchInput").value.toLowerCase();
        let items = document.getElementsByClassName("menu-item");

        for (let item of items) {
            let name = item.querySelector("h3").innerText.toLowerCase();
            item.style.display = name.includes(input) ? "block" : "none";
        }
    }
</script>

</body>
</html>
