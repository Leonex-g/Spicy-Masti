<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spicy Masti</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #ffffff;
  color: #222;
}

/* 🔥 LOGO */
header {
  text-align: center;
  padding: 28px 16px;
}

.logo {
  font-size: 2.6rem;
  font-weight: 800;
  color: #ff2e00;
  text-shadow:
    0 0 8px #ff6a00,
    0 0 16px #ff2e00,
    0 0 24px #ff9900;
  animation: fireGlow 1.5s infinite alternate;
}

@keyframes fireGlow {
  from {
    text-shadow:
      0 0 6px #ff4500,
      0 0 12px #ff6a00;
  }
  to {
    text-shadow:
      0 0 12px #ff0000,
      0 0 24px #ff9900,
      0 0 36px #ff4500;
  }
}

/* 🔍 SEARCH */
.search-box {
  padding: 16px;
}

.search-box input {
  width: 100%;
  padding: 14px 16px;
  font-size: 1rem;
  border-radius: 12px;
  border: 1px solid #ccc;
  outline: none;
}

/* 📂 MENU */
.menu {
  padding: 16px;
}

.category {
  margin-bottom: 18px;
}

.category-title {
  font-size: 1.2rem;
  font-weight: 600;
  color: #d62828;
  border-bottom: 2px solid #f2f2f2;
  padding: 8px 0;
  cursor: pointer;
}

.items {
  margin-top: 8px;
}

.menu-item {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px dashed #ddd;
  font-size: 0.95rem;
}

/* 🔎 SEARCH RESULT */
#searchResults {
  padding: 16px;
  display: none;
}

footer {
  text-align: center;
  padding: 18px;
  font-size: 0.8rem;
  color: #777;
  border-top: 1px solid #eee;
}

/* Desktop */
@media (min-width: 768px) {
  .menu, #searchResults {
    max-width: 700px;
    margin: auto;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">Spicy Masti</div>
</header>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search menu items..." onkeyup="searchMenu()">
</div>

<!-- SEARCH RESULTS -->
<section id="searchResults"></section>

<!-- MENU -->
<section class="menu" id="menu">

  <div class="category">
    <div class="category-title" onclick="toggleCategory(this)">Burger</div>
    <div class="items">
      <div class="menu-item"><span>Aloo Tikki Burger</span><span>₹40</span></div>
      <div class="menu-item"><span>Cheese Burger</span><span>₹55</span></div>
      <div class="menu-item"><span>Double Tikki Burger</span><span>₹60</span></div>
      <div class="menu-item"><span>French Burger</span><span>₹80</span></div>
    </div>
  </div>

  <div class="category">
    <div class="category-title" onclick="toggleCategory(this)">Maggi</div>
    <div class="items">
      <div class="menu-item"><span>Masala Maggi</span><span>₹30</span></div>
      <div class="menu-item"><span>Double Masala Maggi</span><span>₹35</span></div>
      <div class="menu-item"><span>Veggie Maggi</span><span>₹45</span></div>
      <div class="menu-item"><span>Cheese Maggi</span><span>₹60</span></div>
      <div class="menu-item"><span>Chilli Hot Garlic Maggi</span><span>₹70</span></div>
      <div class="menu-item"><span>Maggi Delight</span><span>₹80</span></div>
    </div>
  </div>

  <div class="category">
    <div class="category-title" onclick="toggleCategory(this)">Dessert</div>
    <div class="items">
      <div class="menu-item"><span>Gulab Jamun (3 pcs)</span><span>₹50</span></div>
    </div>
  </div>

</section>

<footer>
  © 2026 Spicy Masti
</footer>

<script>
function toggleCategory(title) {
  const items = title.nextElementSibling;
  items.style.display = items.style.display === "none" ? "block" : "none";
}

function searchMenu() {
  const input = document.getElementById("searchInput").value.toLowerCase();
  const menu = document.getElementById("menu");
  const results = document.getElementById("searchResults");
  results.innerHTML = "";

  if (input === "") {
    menu.style.display = "block";
    results.style.display = "none";
    return;
  }

  menu.style.display = "none";
  results.style.display = "block";

  const items = document.querySelectorAll(".menu-item");

  items.forEach(item => {
    if (item.innerText.toLowerCase().includes(input)) {
      results.appendChild(item.cloneNode(true));
    }
  });
}
</script>

</body>
</html>
